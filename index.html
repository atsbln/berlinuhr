<script type="text/javascript">
function buhrSet(id, color) {
  var e = document.getElementById(id);
  if (e) {
    e.style.background = color;
  }
}

function buhrReset(prefix, count) {
  var i;
  for (i = 0; i < count; i = i + 1) {
    buhrSet(prefix + i, "#bbbbbb");
  }
}

function buhrUpdate() {
  var d = new Date();
  var h = d.getHours();
  var m = d.getMinutes();
  var s = d.getSeconds();

  var h5 = Math.floor(h / 5);
  var h1 = h % 5;
  var m5 = Math.floor(m / 5);
  var m1 = m % 5;
  var s5 = Math.floor(s / 5);
  var s1 = s % 5;

  var i;

  buhrReset("h5_", 4);
  buhrReset("h1_", 4);
  buhrReset("m5_", 11);
  buhrReset("m1_", 4);
  buhrReset("s5_", 11);
  buhrReset("s1_", 4);

  for (i = 0; i < h5; i = i + 1) {
    buhrSet("h5_" + i, "#55aa55");
  }

  for (i = 0; i < h1; i = i + 1) {
    buhrSet("h1_" + i, "#55aa55");
  }

  for (i = 0; i < m5; i = i + 1) {
    if (i == 2 || i == 5 || i == 8) {
      buhrSet("m5_" + i, "#cc5555");
    } else {
      buhrSet("m5_" + i, "#dddd66");
    }
  }

  for (i = 0; i < m1; i = i + 1) {
    buhrSet("m1_" + i, "#dddd66");
  }

  for (i = 0; i < s5; i = i + 1) {
    if (i == 2 || i == 5 || i == 8) {
      buhrSet("s5_" + i, "#cc5555");
    } else {
      buhrSet("s5_" + i, "#5a82cc");
    }
  }

  for (i = 0; i < s1; i = i + 1) {
    buhrSet("s1_" + i, "#5a82cc");
  }
}

buhrUpdate();
setInterval(buhrUpdate, 1000);
</script>
