function setColor(id, color) {
  var e = document.getElementById(id);
  if (e) {
    e.style.background = color;
  }
}

function resetRange(prefix, count, offColor) {
  var i;
  for (i = 0; i < count; i = i + 1) {
    setColor(prefix + i, offColor);
  }
}

function getWeekdayIndex(d) {
  var wd = d.getDay();
  if (wd == 0) {
    return 6;
  }
  return wd - 1;
}

function rotateElement(el, deg) {
  if (!el) {
    return;
  }
  el.style.webkitTransform = "rotate(" + deg + "deg)";
  el.style.transform = "rotate(" + deg + "deg)";
  el.style.webkitTransformOrigin = "50% 100%";
  el.style.transformOrigin = "50% 100%";
}

  m12.style.color = s.textColor;
  m9.style.color = s.textColor;
  m6.style.color = s.textColor;

  dateBox.style.background = s.dateBg;
  dateBox.style.borderColor = s.dateBorder;
  dateBox.style.color = s.dateColor;

  center.style.background = s.centerColor;

  hourHand.style.background = s.hourColor;
  hourHand.style.width = s.hourWidth + "px";
  hourHand.style.height = s.hourLength + "px";
  hourHand.style.left = (120 - Math.floor(s.hourWidth / 2)) + "px";
  hourHand.style.top = s.hourTop + "px";
  hourHand.style.marginLeft = "0";

  minuteHand.style.background = s.minuteColor;
  minuteHand.style.width = s.minuteWidth + "px";
  minuteHand.style.height = s.minuteLength + "px";
  minuteHand.style.left = (120 - Math.floor(s.minuteWidth / 2)) + "px";
  minuteHand.style.top = s.minuteTop + "px";
  minuteHand.style.marginLeft = "0";

  secondHand.style.background = s.secondColor;
  secondHand.style.width = s.secondWidth + "px";
  secondHand.style.height = s.secondLength + "px";
  secondHand.style.left = (120 - Math.floor(s.secondWidth / 2)) + "px";
  secondHand.style.top = s.secondTop + "px";
  secondHand.style.marginLeft = "0";
}

function randomizeAnalogStyle() {
  var nextIndex = analogStyleIndex;
  while (nextIndex == analogStyleIndex) {
    nextIndex = Math.floor(Math.random() * analogStyles.length);
  }
  analogStyleIndex = nextIndex;
  applyAnalogStyle(analogStyleIndex);
}

function updateAnalog() {
  var d = new Date();
  var h = d.getHours();
  var m = d.getMinutes();
  var s = d.getSeconds();
  var day = d.getDate();

  var hourDeg = ((h % 12) * 30) + (m * 0.5);
  var minuteDeg = (m * 6) + (s * 0.1);
  var secondDeg = s * 6;

  document.getElementById("analogDateBox").innerHTML = day;
  rotateElement(document.getElementById("hourHand"), hourDeg);
  rotateElement(document.getElementById("minuteHand"), minuteDeg);
  rotateElement(document.getElementById("secondHand"), secondDeg);
}

function updateClock() {
  var d = new Date();
  var h = d.getHours();
  var m = d.getMinutes();
  var s = d.getSeconds();
  var wdIndex = getWeekdayIndex(d);
  var h5 = Math.floor(h / 5);
  var h1 = h % 5;
  var m5 = Math.floor(m / 5);
  var m1 = m % 5;
  var s5 = Math.floor(s / 5);
  var s1 = s % 5;
  var i;

  resetRange("wd_", 7, "#bbbbbb");
  resetRange("h5_", 4, "#bbbbbb");
  resetRange("h1_", 4, "#bbbbbb");
  resetRange("m5_", 11, "#bbbbbb");
  resetRange("m1_", 4, "#bbbbbb");
  resetRange("s5_", 11, "#bbbbbb");
  resetRange("s1_", 4, "#cfcfcf");

  for (i = 0; i <= wdIndex; i = i + 1) {
    if (i == 3) {
      setColor("wd_" + i, "#b83a3a");
    } else {
      setColor("wd_" + i, "#5a82cc");
    }
  }

  for (i = 0; i < h5; i = i + 1) {
    setColor("h5_" + i, "#2f8f2f");
  }

  for (i = 0; i < h1; i = i + 1) {
    setColor("h1_" + i, "#2f8f2f");
  }

  for (i = 0; i < m5; i = i + 1) {
    if (i == 2 || i == 5 || i == 8) {
      setColor("m5_" + i, "#b83a3a");
    } else {
      setColor("m5_" + i, "#d4bf2a");
    }
  }

  for (i = 0; i < m1; i = i + 1) {
    setColor("m1_" + i, "#d4bf2a");
  }

  for (i = 0; i < s5; i = i + 1) {
    if (i == 2 || i == 5 || i == 8) {
      setColor("s5_" + i, "#cc5555");
    } else {
      setColor("s5_" + i, "#5a82cc");
    }
  }

  for (i = 0; i < s1; i = i + 1) {
    setColor("s1_" + i, "#8ea7d8");
  }
}

function updateCalendar() {
  var d = new Date();
  var wdIndex = getWeekdayIndex(d);
  var day = d.getDate();
  var month = d.getMonth() + 1;
  var year = d.getFullYear() - 2000;

  var day5 = Math.floor(day / 5);
  var day1 = day % 5;

  var mon5 = Math.floor(month / 5);
  var mon1 = month % 5;

  var yrHundreds = 0;
  var yrFifty = 0;
  var yrMid = 0;
  var yrLow = 0;
  var remaining = year;
  var i;

  resetRange("cwd_", 7, "#bbbbbb");
  resetRange("day5_", 6, "#bbbbbb");
  resetRange("day1_", 4, "#bbbbbb");
  resetRange("mon5_", 2, "#bbbbbb");
  resetRange("mon1_", 4, "#bbbbbb");
  resetRange("yr50_", 2, "#bbbbbb");
  resetRange("yr5_", 9, "#bbbbbb");
  resetRange("yr1_", 4, "#bbbbbb");

  for (i = 0; i <= wdIndex; i = i + 1) {
    if (i == 3) {
      setColor("cwd_" + i, "#b83a3a");
    } else {
      setColor("cwd_" + i, "#5a82cc");
    }
  }

  for (i = 0; i < day5; i = i + 1) {
    setColor("day5_" + i, "#ff4fd8");
  }

  for (i = 0; i < day1 && i < 4; i = i + 1) {
    setColor("day1_" + i, "#ff4fd8");
  }

  for (i = 0; i < mon5 && i < 2; i = i + 1) {
    setColor("mon5_" + i, "#00d5ff");
  }

  for (i = 0; i < mon1 && i < 4; i = i + 1) {
    setColor("mon1_" + i, "#00d5ff");
  }

  if (remaining == 100) {
    yrHundreds = 1;
    remaining = 0;
  } else if (remaining >= 50) {
    yrFifty = 1;
    remaining = remaining - 50;
  }

  yrMid = Math.floor(remaining / 5);
  yrLow = remaining % 5;

  if (yrFifty == 1) {
    setColor("yr50_0", "#7cff00");
  }

  if (yrHundreds == 1) {
    setColor("yr50_1", "#7cff00");
  }

  for (i = 0; i < yrMid && i < 9; i = i + 1) {
    if (i == 1 || i == 3 || i == 5 || i == 7) {
      setColor("yr5_" + i, "#ff3a3a");
    } else {
      setColor("yr5_" + i, "#7cff00");
    }
  }

  for (i = 0; i < yrLow && i < 4; i = i + 1) {
    setColor("yr1_" + i, "#7cff00");
  }
}

function renderViews() {
  document.getElementById("clockView").style.display = (currentView == "clock") ? "block" : "none";
  document.getElementById("calendarView").style.display = (currentView == "calendar") ? "block" : "none";
  document.getElementById("analogView").style.display = (currentView == "analog") ? "block" : "none";

  if (currentView == "clock") {
    updateClock();
  } else if (currentView == "calendar") {
    updateCalendar();
  } else {
    updateAnalog();
  }
}

function goToStartClock() {
  currentView = "clock";
  renderViews();
}

function startAnalogLongPress() {
  if (currentView != "analog") {
    return;
  }

  analogLongPressTriggered = false;

  if (analogLongPressTimer) {
    clearTimeout(analogLongPressTimer);
  }

  analogLongPressTimer = setTimeout(function () {
    analogLongPressTriggered = true;
    goToStartClock();
    analogLongPressTimer = null;
  }, 700);
}

function cancelAnalogLongPress() {
  if (analogLongPressTimer) {
    clearTimeout(analogLongPressTimer);
    analogLongPressTimer = null;
  }
}

function handleAppTap() {
  if (currentView == "clock") {
    currentView = "calendar";
    renderViews();
  } else if (currentView == "calendar") {
    currentView = "analog";
    renderViews();
  } else {
    if (analogLongPressTriggered) {
      analogLongPressTriggered = false;
      return;
    }
    randomizeAnalogStyle();
  }
}

var appElement = document.getElementById("app");

appElement.onclick = handleAppTap;

if (appElement.addEventListener) {
  appElement.addEventListener("touchstart", startAnalogLongPress, false);
  appElement.addEventListener("touchend", cancelAnalogLongPress, false);
  appElement.addEventListener("touchcancel", cancelAnalogLongPress, false);

  appElement.addEventListener("mousedown", startAnalogLongPress, false);
  appElement.addEventListener("mouseup", cancelAnalogLongPress, false);
  appElement.addEventListener("mouseleave", cancelAnalogLongPress, false);
}

analogStyleIndex = 0;
applyAnalogStyle(analogStyleIndex);
renderViews();

setInterval(function () {
  renderViews();
}, 1000);
</script>

</body>
</html>
