<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ton-Test</title>

  <!-- Version 20 -->

</head>
<body style="margin:0;padding:30px;background:#eeeeee;font-family:Arial,Helvetica,sans-serif;text-align:center;">

  <div style="margin-top:40px;">
    <button id="testButton" style="font-size:20px;padding:12px 24px;">Ton testen</button>
  </div>

  <div style="margin-top:20px;font-size:16px;color:#444444;">
    Einmal antippen. Wenn ein kurzer Ton hörbar ist, eignet sich das Gerät wahrscheinlich auch für die Uhr.
  </div>

  <audio id="beepAudio" preload="auto">
    <source src="beep.mp3" type="audio/mpeg">
  </audio>

  <script type="text/javascript">
    var btn = document.getElementById("testButton");
    var audio = document.getElementById("beepAudio");

    btn.onclick = function () {
      try {
        audio.currentTime = 0;
      } catch (e) {
      }
      audio.play();
    };
  </script>

</body>
</html>
